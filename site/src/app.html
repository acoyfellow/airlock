<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="/favicon.png" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "new-sdlc",
        "description": "A push deploys a candidate to a non-serving slot, fans out tests in parallel, and promotes the feature gate only when keel admits a signed proof bound to that exact candidate.",
        "codeRepository": "https://github.com/acoyfellow/new-sdlc",
        "programmingLanguage": "TypeScript",
        "runtimePlatform": "Bun",
        "license": "https://github.com/acoyfellow/new-sdlc/blob/main/LICENSE"
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
