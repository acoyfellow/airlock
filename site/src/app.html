<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a1216" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f7f8" media="(prefers-color-scheme: light)" />
    <script>
      // Apply the saved theme before first paint to avoid a flash. A ?theme=
      // query param wins so screenshot harnesses (WKWebView blocks
      // cross-origin localStorage) can force light/dark without a click.
      try {
        var q = new URLSearchParams(location.search).get('theme');
        if (q === 'light' || q === 'dark') {
          document.documentElement.setAttribute('data-theme', q);
          try { localStorage.setItem('airlock-theme', q); } catch (e) {}
        } else {
          var t = localStorage.getItem('airlock-theme');
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    </script>
    <link rel="icon" href="/favicon.png" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;650;700;800&display=swap"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "airlock",
        "description": "A small pipeline: push a candidate, deploy it to a slot that serves no traffic, run the tests in parallel, and make that version live only if a signed proof bound to that exact candidate verifies.",
        "programmingLanguage": "TypeScript",
        "runtimePlatform": "Bun",
        "license": "MIT"
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
